name: sports-arena

services:
  strapi:
    container_name: sports-arena-strapi
    image: sports-arena/strapi:development
    build:
      context: .
      dockerfile: Dockerfile
    # All variables from env_file are injected into the container
    # Use .env.docker for docker specific variables
    env_file:
      - path: .env
      - path: .env.docker
    volumes:
      - type: bind
        source: package.json
        target: /opt/package.json
      - type: bind
        source: package-lock.json
        target: /opt/package-lock.json
      - type: bind
        source: config
        target: /opt/app/config
      - type: bind
        source: src
        target: /opt/app/src
      - type: bind
        source: public/uploads
        target: /opt/app/public/uploads
      # Needed because Strapi uses dotenv to read .env in development
      - type: bind
        source: .env
        target: /opt/app/.env
      - type: bind
        source: .env.docker
        target: /opt/app/.env.docker
    ports:
      - "1337:1337"
    networks:
      - sports-arena
    depends_on:
      strapiDB:
        condition: service_healthy

  strapiDB:
    container_name: sports-arena-strapi-db
    image: postgres:18-alpine
    # Uncomment if you encounter platform errors on Apple Silicon
    # platform: linux/amd64
    environment:
      POSTGRES_USER: ${DATABASE_USERNAME}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD}
      POSTGRES_DB: ${DATABASE_NAME}
    volumes:
      - type: volume
        source: strapi-db-data
        target: /var/lib/postgresql
    ports:
      # Exposed for local debugging tools; remove if not needed
      - "5432:5432"
    networks:
      - sports-arena
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${DATABASE_USERNAME} -d ${DATABASE_NAME}" ]
      interval: 10s
      timeout: 5s
      retries: 5

  strapiAdminer:
    container_name: sports-arena-strapi-adminer
    image: adminer:latest
    ports:
      - "8888:8080"
    environment:
      - ADMINER_DEFAULT_SERVER=strapiDB
    networks:
      - sports-arena
    depends_on:
      - strapiDB

volumes:
  strapi-db-data:
    name: sports-arena-db-data

networks:
  sports-arena:
    name: sports-arena-network
    driver: bridge
